name: Build CV
on:
  push:
    branches: [main]
    paths: ['cv/**.tex', '.github/workflows/build-cv.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compilar LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          working_directory: cv
      - name: Publicar PDF
        run: |
          mkdir -p resources
          cp cv/cv.pdf resources/cv.pdf
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resources/cv.pdf
          git diff --staged --quiet || git commit -m "Actualizar CV [skip ci]"
          git push
